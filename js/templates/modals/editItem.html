<!-- templates/modals/editItem.html - Modal Editar Item -->
<div class="modal" id="editItemModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Editar Item</h2>
      <button class="modal-close" onclick="closeModal('editItemModal')">✕</button>
    </div>
    <form id="editItemForm" onsubmit="handleEditItem(event)">
      <div class="modal-form">
        <div class="form-group">
          <label>Nome do Item</label>
          <input type="text" id="editItemName" required maxlength="50">
        </div>
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="editItemQty" min="1" value="1" required>
        </div>
        <div class="form-group">
          <label>Unidade</label>
          <select id="editItemUnit">
            <option value="un">un</option>
            <option value="kg">kg</option>
            <option value="l">l</option>
            <option value="m">m</option>
            <option value="cx">cx</option>
          </select>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <input type="text" id="editItemCategory" maxlength="30">
        </div>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-p">Salvar</button>
        <button type="button" class="btn-sec" onclick="closeModal('editItemModal')">Cancelar</button>
      </div>
    </form>
  </div>
</div>
