<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Multiempresas</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Files (extracted from inline styles) -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- Main App Container -->
  <div class="app">
    <!-- Progress Bar -->
    <div class="lb" id="loadBar"></div>
    
    <!-- Topbar -->
    <div class="topbar" id="topbar">
      <div class="topbar-left">
        <h1 class="app-title" id="appTitle">Sistema Multiempresas</h1>
        <span class="hh-badge" id="householdBadge" style="display:none;"></span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
        <button class="av-btn" id="avBtn" onclick="toggleAccountMenu()">?</button>
        <div class="acc-menu" id="accMenu" style="display:none;">
          <p class="acc-name" id="accName">User</p>
          <p class="acc-role" id="accRole">MEMBER</p>
          <button class="acc-btn" onclick="openSettings()">Settings</button>
          <button class="acc-btn" id="orgLogoBtn" onclick="updateOrgLogo()" style="display:none;">Change Logo</button>
          <button class="acc-logout" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>

    <!-- Auth Screen (Login/Register/Recovery) -->
    <div class="auth-screen" id="authScreen">
      <button class="themeToggleAuth" id="themeToggleAuth" onclick="toggleTheme()">🌙</button>
      <div class="auth-icon">🔐</div>
      <h1>Login</h1>
      <p>Acesse sua conta</p>
      <form id="authForm" onsubmit="handleAuthSubmit(event)">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit" class="btn-p">Login</button>
      </form>
      <button class="link-forgot" onclick="toggleAuthMode('register')">Criar Conta</button>
      <button class="link-forgot" onclick="toggleAuthMode('recovery')">Recuperar Acesso</button>
      <div class="err" id="authErr"></div>
    </div>

    <!-- Household Screen -->
    <div class="hh-screen" id="hhScreen" style="display:none;">
      <h2>Minhas Lojas</h2>
      <p class="sub">Selecione uma loja para começar</p>
      <div class="hh-list" id="hhList"></div>
      <button class="hh-add" onclick="addHousehold()">+ Adicionar Loja</button>
    </div>

    <!-- Main App Screen -->
    <div class="main" id="main" style="display:none;">
      <!-- Add Form -->
      <div class="add-form-wrap">
        <div class="add-row1">
          <input type="text" id="itemName" placeholder="Novo item..." maxlength="50">
          <button class="add-btn" onclick="addItem()">+</button>
          <button class="expand-btn" id="expandBtn" onclick="toggleAddExtra()">⋯</button>
        </div>
        <div class="add-extra" id="addExtra">
          <div class="qty-unit-row">
            <input type="number" id="qty" placeholder="Qtd" min="1" value="1">
            <select id="unit" class="unit-sel">
              <option>un</option>
              <option>kg</option>
              <option>l</option>
              <option>m</option>
            </select>
          </div>
          <input type="text" id="category" placeholder="Categoria">
        </div>
      </div>

      <!-- Filters & Search -->
      <div class="filter-row">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="searchItems()">
          <button class="search-clear" onclick="clearSearch()" style="display:none;">✕</button>
        </div>
      </div>

      <div class="tabs">
        <button class="group-toggle" onclick="setStatusFilter('todos')">Todos</button>
        <button class="group-toggle" onclick="setStatusFilter('comprados')">Comprados</button>
        <button class="group-toggle" onclick="setStatusFilter('pendentes')">Pendentes</button>
      </div>

      <!-- Items List -->
      <div id="itemsContainer"></div>

      <!-- Empty State -->
      <div class="empty" id="emptyState" style="display:none;">
        <div class="empty-icon">📦</div>
        <div class="empty-text">Nenhum item encontrado</div>
      </div>
    </div>
  </div>

  <!-- FAB Button -->
  <button class="fab" id="fab" onclick="openSettings()" style="display:none;">⚙️</button>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <!-- Modals -->
  <div class="modal hidden" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Configurações</h2>
        <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div id="settingsContent"></div>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/middleware/authMiddleware.js"></script>
  <script src="js/middleware/permissionMiddleware.js"></script>
  <script src="js/middleware/rateLimiter.js"></script>
  <script src="js/security/encryption.js"></script>
  <script src="js/security/permissions.js"></script>
  <script src="js/security/sessionManager.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
