<!-- templates/modals/settings.html - Modal Configurações -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Configurações</h2>
      <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
    </div>
    
    <!-- Settings Tabs -->
    <div style="display:flex; border-bottom:1px solid var(--border); gap:0;">
      <button class="settings-tab active" onclick="switchSettingsTab('profile')">Perfil</button>
      <button class="settings-tab" onclick="switchSettingsTab('households')">Lojas</button>
      <button class="settings-tab" onclick="switchSettingsTab('members')">Membros</button>
      <button class="settings-tab" onclick="switchSettingsTab('org')">Organização</button>
    </div>

    <!-- Tab: Profile -->
    <div class="settings-tab-content" id="profileTab">
      <form id="profileForm" onsubmit="handleProfileUpdate(event)" style="display:flex; flex-direction:column; gap:12px; padding:16px;">
        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" id="settingsName" required maxlength="50">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="settingsEmail" required>
        </div>
        <div class="form-group">
          <label>Senha (deixe em branco para não alterar)</label>
          <input type="password" id="settingsPassword" minlength="8" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
          <label>Foto de Perfil</label>
          <input type="file" id="settingsPhoto" accept="image/*" onchange="previewPhoto(event)">
          <div id="photoPreview" style="width:64px; height:64px; border-radius:50%; margin-top:8px; background-size:cover; background-position:center;"></div>
        </div>
        <button type="submit" class="btn-p">Salvar Perfil</button>
      </form>
    </div>

    <!-- Tab: Households (Lojas) -->
    <div class="settings-tab-content hidden" id="householdsTab">
      <div style="padding:16px;">
        <div id="householdsList" style="display:flex; flex-direction:column; gap:8px;">
          <!-- Loaded dynamically -->
        </div>
        <button class="btn-sec" onclick="openAddHouseholdModal()" style="margin-top:12px;">+ Adicionar Loja</button>
      </div>
    </div>

    <!-- Tab: Members (Membros) -->
    <div class="settings-tab-content hidden" id="membersTab">
      <div style="padding:16px;">
        <div id="membersList" style="display:flex; flex-direction:column; gap:8px;">
          <!-- Loaded dynamically -->
        </div>
        <button class="btn-sec" onclick="openAddMemberModal()" style="margin-top:12px;">+ Adicionar Membro</button>
      </div>
    </div>

    <!-- Tab: Organization (Organização) -->
    <div class="settings-tab-content hidden" id="orgTab">
      <form id="orgForm" onsubmit="handleOrgUpdate(event)" style="display:flex; flex-direction:column; gap:12px; padding:16px;">
        <div class="form-group">
          <label>Nome da Organização</label>
          <input type="text" id="orgName" required maxlength="50">
        </div>
        <div class="form-group">
          <label>Logo da Organização</label>
          <input type="file" id="orgLogo" accept="image/*" onchange="previewOrgLogo(event)">
          <div id="orgLogoPreview" style="width:100px; height:100px; border-radius:8px; margin-top:8px; background-size:contain; background-position:center; background-repeat:no-repeat; border:1px solid var(--border);"></div>
        </div>
        <button type="submit" class="btn-p">Salvar Organização</button>
      </form>
    </div>

  </div>
</div>
