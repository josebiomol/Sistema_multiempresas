<!-- templates/auth.html - Tela de Autenticação -->
<div class="auth-screen" id="authScreen">
  <button class="themeToggleAuth" id="themeToggleAuth" onclick="toggleTheme()">🌙</button>
  
  <!-- Login Screen -->
  <div id="loginScreen" class="auth-mode-screen">
    <div class="auth-icon">🔐</div>
    <h1>Login</h1>
    <p>Acesse sua conta</p>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Senha" required>
      <button type="submit" class="btn-p">Login</button>
    </form>
    <div class="err" id="loginErr"></div>
    <div class="auth-divider"><span>ou</span></div>
    <button class="btn-sec" onclick="switchAuthMode('register')">Criar Conta</button>
    <button class="link-forgot" onclick="switchAuthMode('recovery')">Recuperar Acesso</button>
  </div>

  <!-- Register Screen (hidden by default) -->
  <div id="registerScreen" class="auth-mode-screen" style="display:none;">
    <div class="auth-icon">📝</div>
    <h1>Criar Conta</h1>
    <p>Cadastre-se para começar</p>
    <form id="registerForm" onsubmit="handleRegister(event)">
      <input type="text" id="registerName" placeholder="Nome Completo" required>
      <input type="email" id="registerEmail" placeholder="Email" required>
      <input type="password" id="registerPassword" placeholder="Senha" required minlength="8">
      <small style="color: var(--text-soft); font-size: 12px;">Mínimo 8 caracteres</small>
      <button type="submit" class="btn-p" style="margin-top: 8px;">Criar Conta</button>
    </form>
    <div class="err" id="registerErr"></div>
    <button class="link-forgot" style="margin-top: 16px;" onclick="switchAuthMode('login')">Voltar para Login</button>
  </div>

  <!-- Recovery Screen (hidden by default) -->
  <div id="recoveryScreen" class="auth-mode-screen" style="display:none;">
    <div class="auth-icon">🔑</div>
    <h1>Recuperar Acesso</h1>
    <p>Digite seu email para recuperar</p>
    <form id="recoveryForm" onsubmit="handlePasswordRecovery(event)">
      <input type="email" id="recoveryEmail" placeholder="Email" required>
      <button type="submit" class="btn-p">Enviar Link</button>
    </form>
    <div class="err" id="recoveryErr"></div>
    <button class="link-forgot" style="margin-top: 16px;" onclick="switchAuthMode('login')">Voltar para Login</button>
  </div>
</div>
