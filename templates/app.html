<!-- templates/app.html - Tela Principal de Items -->
<div class="main" id="appScreen">
  <!-- Add Item Form -->
  <div class="add-form-wrap">
    <div class="add-row1">
      <input type="text" id="itemName" placeholder="Novo item..." maxlength="50">
      <button class="add-btn" onclick="addItem()" title="Adicionar">+</button>
      <button class="expand-btn" id="expandBtn" onclick="toggleAddExtra()">⋯</button>
    </div>
    <div class="add-extra" id="addExtra">
      <div class="qty-unit-row">
        <input type="number" id="qty" placeholder="Qtd" min="1" value="1">
        <select id="unit" class="unit-sel">
          <option value="un">un</option>
          <option value="kg">kg</option>
          <option value="l">l</option>
          <option value="m">m</option>
          <option value="cx">cx</option>
        </select>
      </div>
      <select id="category" class="unit-sel">
        <option value="">Categoria...</option>
      </select>
    </div>
  </div>

  <!-- Category Pills -->
  <div class="cat-pills-wrap">
    <div class="cat-pills" id="categoryPills">
      <!-- Loaded dynamically -->
    </div>
  </div>

  <!-- Filters & Search -->
  <div class="filter-row">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="searchItems()">
      <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">✕</button>
    </div>
  </div>

  <!-- Status Filters -->
  <div class="tabs">
    <button class="group-toggle active" onclick="setStatusFilter('todos')">Todos</button>
    <button class="group-toggle" onclick="setStatusFilter('pendentes')">Pendentes</button>
    <button class="group-toggle" onclick="setStatusFilter('comprados')">Comprados</button>
  </div>

  <!-- Items List -->
  <div id="itemsContainer">
    <!-- Loaded dynamically -->
  </div>

  <!-- Empty State -->
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">📦</div>
    <div class="empty-text">Nenhum item encontrado</div>
  </div>
</div>

<!-- Template para cada item (replicado via JS) -->
<template id="itemTemplate">
  <ul class="items">
    <li class="item" data-item-id="{{itemId}}">
      <div class="item-check" onclick="toggleItemCheck(event)">✓</div>
      <div class="item-info">
        <p class="item-name">{{name}}</p>
        <div class="item-meta">
          <span class="item-cat">{{category}}</span>
          {{qtdMeta}}
        </div>
      </div>
      <div class="item-actions">
        <button class="item-action" onclick="editItem(event)" title="Editar">✏️</button>
        <button class="item-action del" onclick="deleteItem(event)" title="Deletar">🗑️</button>
      </div>
    </li>
  </ul>
</template>
